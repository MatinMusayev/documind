name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          OPENAI_API_KEY: "sk-test-placeholder"
        run: pytest tests/ -v
      - name: Lint
        run: pip install flake8 && flake8 app/ --max-line-length=120 --ignore=E501,W503
